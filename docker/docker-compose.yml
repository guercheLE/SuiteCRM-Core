services:
  db:
    image: 'mariadb:10.11'
    environment:
      MARIADB_ROOT_PASSWORD: '${MARIADB_ROOT_PASSWORD}'
      MARIADB_DATABASE: '${MARIADB_DATABASE}'
      MARIADB_USER: '${MARIADB_USER}'
      MARIADB_PASSWORD: '${MARIADB_PASSWORD}'
    volumes:
      - 'db_data:/var/lib/mysql'
    healthcheck:
      test:
        - CMD
        - healthcheck.sh
        - '--connect'
        - '--innodb_initialized'
      interval: 10s
      timeout: 5s
      retries: 10
  suitecrm:
    image: 'guerchele/suitecrm:8-latest'
    ports:
      - '${PORT}:80'
    environment:
      DATABASE_HOST: db
      DATABASE_NAME: '${MARIADB_DATABASE}'
      DATABASE_USER: '${MARIADB_USER}'
      DATABASE_PASSWORD: '${MARIADB_PASSWORD}'
      PHP_INI_DISPLAY_ERRORS: '${PHP_INI_DISPLAY_ERRORS}'
    volumes:
      - 'html_data:/var/www/html'
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - curl
        - '-f'
        - 'http://localhost/'
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
volumes:
  db_data:
  html_data:
